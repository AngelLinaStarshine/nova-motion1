# Netlify — repo root is the Vite app (`package.json` + `src/` here).
# In Netlify: leave "Base directory" empty (repo root). Build outputs to `dist/`.

[build]
  command = "npm install && npm run build"
  publish = "dist"

# Client-side routing (React Router): avoid 404 on refresh / deep links
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
